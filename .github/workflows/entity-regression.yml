name: Entity Regression Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      fixture_path:
        description: Optional fixture path override
        required: false
        type: string
      max_regressions:
        description: Maximum allowed regression mismatches
        required: false
        default: "0"
        type: string

jobs:
  entity-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run entity regression gate
        env:
          FIXTURE_PATH: ${{ github.event.inputs.fixture_path }}
          MAX_REGRESSIONS: ${{ github.event.inputs.max_regressions }}
        run: |
          set -euo pipefail
          python tools/entity_regression/runner.py \
            --fixture "${FIXTURE_PATH:-tests/entities/golden/entity_regression_cases.json}" \
            --max-regressions "${MAX_REGRESSIONS:-0}" \
            --report-out artifacts/entity_regression/report.json

      - name: Upload entity regression report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: entity-regression-report
          path: artifacts/entity_regression/report.json
          if-no-files-found: warn
