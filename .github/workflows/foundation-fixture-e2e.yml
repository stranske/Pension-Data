name: Foundation Fixture E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      fixture_path:
        description: Optional fixture JSON path override
        required: false
        type: string

jobs:
  foundation-fixture-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run foundation fixture pipeline command
        env:
          FIXTURE_PATH: ${{ github.event.inputs.fixture_path }}
        run: |
          set -euo pipefail
          python tools/foundation/run_fixture_pipeline.py \
            --fixture "${FIXTURE_PATH:-tests/e2e/foundation/fixtures/foundation_fixture_success.json}" \
            --output-root artifacts

      - name: Run one-PDF pilot against committed CalPERS excerpt fixture
        run: |
          set -euo pipefail
          one-pdf-pilot \
            --pdf-path tests/parser/fixtures/calpers_fy2024_excerpt.pdf \
            --plan-id CA-PERS \
            --plan-period FY2024 \
            --effective-date 2024-06-30 \
            --ingestion-date 2026-01-01 \
            --output-root artifacts/one_pdf_pilot_calpers_excerpt

      - name: Validate one-PDF pilot CalPERS excerpt run
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          run_root = Path("artifacts/one_pdf_pilot_calpers_excerpt/one_pdf_pilot")
          manifests = sorted(run_root.glob("*/run_manifest.json"))
          if len(manifests) != 1:
              raise SystemExit(
                  f"expected exactly one one-PDF pilot run manifest, found {manifests}"
              )
          run_dir = manifests[0].parent

          manifest = json.loads(manifests[0].read_text(encoding="utf-8"))
          if manifest.get("ledger_status") != "success":
              raise SystemExit(
                  f"CalPERS excerpt pilot ledger_status was {manifest.get('ledger_status')!r}, "
                  "expected 'success'"
              )

          parser_result = json.loads(
              (run_dir / "parser_result.json").read_text(encoding="utf-8")
          )
          if parser_result.get("missing_metrics"):
              raise SystemExit(
                  "CalPERS excerpt pilot reported missing funded metrics: "
                  f"{parser_result['missing_metrics']}"
              )
          PY

      - name: Validate foundation fixture artifacts
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("artifacts/foundation")
          required = [
              root / "discovery_rows.json",
              root / "ingestion_summary.json",
              root / "coverage_readiness.json",
              root / "latest_run_ledger.json",
              root / "run_ledger.jsonl",
          ]
          for path in required:
              if not path.exists():
                  raise SystemExit(f"missing required artifact: {path}")

          latest = json.loads((root / "latest_run_ledger.json").read_text(encoding="utf-8"))
          if latest.get("status") != "success":
              raise SystemExit("foundation fixture pipeline did not report success")
          if len(latest.get("stage_metrics", [])) != 5:
              raise SystemExit("foundation fixture ledger does not include all expected stages")
          PY

      - name: Prepare reviewable findings generator inputs
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          from pension_data.coverage.readiness import write_coverage_artifacts
          from pension_data.extract.persistence import extraction_persistence_contract

          artifact_root = Path("artifacts")
          coverage_payload = json.loads(
              (artifact_root / "foundation" / "coverage_readiness.json").read_text(
                  encoding="utf-8"
              )
          )
          write_coverage_artifacts(coverage_payload, output_root=artifact_root)

          persistence_dir = artifact_root / "extraction_persistence"
          persistence_dir.mkdir(parents=True, exist_ok=True)
          (persistence_dir / "persistence_contract.json").write_text(
              json.dumps(extraction_persistence_contract(), indent=2, sort_keys=True),
              encoding="utf-8",
          )
          PY

      - name: Build reviewable findings artifact
        run: |
          set -euo pipefail
          python scripts/langchain/build_reviewable_findings_artifact.py \
            --persistence-contract artifacts/extraction_persistence/persistence_contract.json \
            --readiness-csv artifacts/coverage/readiness_rows.csv \
            --output artifacts/reviewable-findings/extraction-quality-dashboard.json
          python - <<'PY'
          import json

          from pension_data.langchain.review_artifact import (
              validate_reviewable_findings_artifact,
          )

          with open(
              "artifacts/reviewable-findings/extraction-quality-dashboard.json",
              encoding="utf-8",
          ) as handle:
              validate_reviewable_findings_artifact(json.load(handle))
          PY

      - name: Verify reviewable findings generator fails on missing readiness CSV
        run: |
          set -euo pipefail
          if python scripts/langchain/build_reviewable_findings_artifact.py \
            --persistence-contract artifacts/extraction_persistence/persistence_contract.json \
            --readiness-csv artifacts/coverage/missing-readiness.csv \
            --output artifacts/reviewable-findings/should-not-exist.json; then
            echo "generator unexpectedly succeeded with a missing readiness CSV" >&2
            exit 1
          fi

      - name: Run foundation fixture tests
        run: |
          set -euo pipefail
          pytest -q --no-cov tests/ops/test_foundation_ledger.py tests/e2e/foundation/test_fixture_pipeline.py tests/ops/test_one_pdf_pilot_real_pdf.py

      - name: Upload foundation fixture artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: foundation-fixture-artifacts
          path: artifacts/foundation
          if-no-files-found: warn

      - name: Upload reviewable findings artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reviewable-findings-artifacts
          path: artifacts/reviewable-findings
          if-no-files-found: warn

      - name: Upload one-PDF pilot CalPERS excerpt artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: one-pdf-pilot-calpers-excerpt-artifacts
          path: artifacts/one_pdf_pilot_calpers_excerpt
          if-no-files-found: warn
