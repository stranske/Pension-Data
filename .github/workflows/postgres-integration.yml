name: PostgreSQL Integration

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pension_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pension_data"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    env:
      PENSION_DATA_TEST_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/pension_data

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install project deps
        run: uv sync --extra postgres --dev

      - name: Apply migrations
        run: |
          uv run python scripts/run_db_migrations.py \
            --environment production \
            --database-url "${PENSION_DATA_TEST_POSTGRES_URL}"

      - name: Run PostgreSQL integration tests
        run: |
          uv run pytest -q --no-cov \
            tests/query/test_sql_endpoint_postgres_integration.py \
            tests/db/test_staging_persistence_postgres_integration.py
